<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK eSports Premium Platform</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <header>
        <div class="logo-container"><h1 class="logo-text" onclick="showSection('game-selection')" style="cursor:pointer;">SK ESPORTS</h1></div>
        <nav id="nav-controls">
            <button class="auth-btn" id="loginNavBtn" onclick="openAuthModal()">Login / Signup</button>
            <div id="userProfileHeader" class="hidden">
                <span id="header-wallet" onclick="openWalletModal()" style="cursor: pointer; background: #1c232d; padding: 6px 12px; border-radius: 20px; border: 1px solid #ff4655;">🪙 <span id="user-coins">0</span> Coins</span>
                <button class="logout-btn" onclick="logoutUser()">Logout</button>
            </div>
        </nav>
    </header>

    <div id="authModal" class="modal-overlay hidden">
        <div class="modal-card">
            <button class="close-modal" onclick="closeAuthModal()">×</button>
            <h2 id="auth-title">Login to SK eSports</h2>
            <form id="authForm">
                <div class="form-group"><label>Mobile:</label><input type="text" id="authIdentifier" required placeholder="Enter 10-digit mobile"></div>
                <div class="form-group"><label>Password:</label><input type="password" id="authPassword" required placeholder="Enter password"></div>
                <button type="submit" class="submit-btn" id="authSubmitBtn">Login</button>
            </form>
            <p class="toggle-auth-text"><a href="#" onclick="toggleAuthMode()">Switch Mode</a></p>
        </div>
    </div>

    <!-- Join Modal -->
    <div id="joinModal" class="modal-overlay hidden">
        <div class="modal-card">
            <button class="close-modal" onclick="closeJoinModal()">×</button>
            <h2>Player Registration</h2>
            <form id="joinForm">
                <div class="form-group"><label>In-Game Name:</label><input type="text" id="playerGameName" required></div>
                <div class="form-group"><label>Game UID:</label><input type="text" id="playerGameUID" required></div>
                <button type="submit" class="submit-btn" style="background:#2ecc71;">Confirm & Join</button>
            </form>
        </div>
    </div>

    <main class="container">
        <section id="game-selection" class="interface-section active">
            <h1 class="main-title">SELECT YOUR GAME</h1>
            <div class="game-grid">
                <div class="game-card ff-card" onclick="checkAuthAndSelect('Free Fire MAX')"><h2>FREE FIRE MAX</h2></div>
                <div class="game-card bgmi-card" onclick="checkAuthAndSelect('BGMI')"><h2>BGMI</h2></div>
            </div>
        </section>

        <section id="tournament-view" class="interface-section">
            <button class="back-btn" onclick="showSection('game-selection')">← Back</button>
            <h2 id="selected-game-title">Tournaments</h2>
            <div class="tabs-container" style="display:flex; gap:5px;">
                <button class="tab-btn" onclick="switchMatchTab('upcoming')" id="tab-upcoming">Upcoming</button>
                <button class="tab-btn" onclick="switchMatchTab('live')" id="tab-live">Live</button>
                <button class="tab-btn" onclick="switchMatchTab('my_joined')" id="tab-my_joined">My Matches</button>
                <button class="tab-btn" onclick="switchMatchTab('past')" id="tab-past">Past</button>
            </div>
            <div class="tournament-list" id="tournaments-container"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
